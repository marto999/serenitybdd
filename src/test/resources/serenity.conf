
serenity {
  #take.screenshots = FOR_FAILURES
  take.screenshots = FOR_EACH_ACTION

}

headless.mode = false

webdriver {
  driver = chrome
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = [
        "start-maximized",
        "remote-allow-origins=*",
        "no-sandbox",
        "ignore-certificate-errors"
      ]
    }
  }

  environments{

  default{
 # webdriver.base.url="http://localhost:5500/register.html"
  webdriver.base.url="http://localhost:5500/login.html"
  }

  dev{
  #webdriver.base.url="http://localhost:5500/dev/register.html"
  }

  qa{

  }


  }
}
